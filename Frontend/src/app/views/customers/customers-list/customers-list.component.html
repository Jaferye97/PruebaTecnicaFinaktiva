<h4 class="text-center">Customers</h4>

<div class="d-flex justify-content-end align-items-center mb-3">
  <button mat-raised-button color="primary" (click)="onAddCustomer()">
    <mat-icon>add</mat-icon>
    Add Customer
  </button>
</div>

<ng-container *ngIf="loadingPage; else content">
  <div class="d-flex justify-content-center align-items-center vh-100">
    <mat-progress-spinner mode="indeterminate" diameter="50" color="primary">
    </mat-progress-spinner>
  </div>
</ng-container>

<ng-template #content>
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z2 w-100"
  >
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <!-- Email Column -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">{{ element.email }}</td>
    </ng-container>

    <!-- Email Column -->
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Created At</th>
      <td mat-cell *matCellDef="let element">
        {{ element.createdAt | date : "dd/MM/yyyy HH:mm" }}
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          color="primary"
          (click)="onEditCustomer(element)"
        >
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Header & Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
</ng-template>
