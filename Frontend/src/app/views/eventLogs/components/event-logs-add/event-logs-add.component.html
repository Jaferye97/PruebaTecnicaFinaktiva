<h2 mat-dialog-title>Add Event Log</h2>
<h2 mat-dialog-title>Formulario de eventos manuales</h2>

<mat-dialog-content [formGroup]="eventLogForm" class="form-container">
  <mat-form-field appearance="outline" class="full-width pt-2">
    <mat-label>Event Date</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="eventDate" />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
    <mat-error *ngIf="eventLogForm.get('eventDate')?.hasError('required')">
      Event Date is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Description</mat-label>
    <textarea matInput rows="3" formControlName="description"></textarea>
    <mat-error *ngIf="eventLogForm.get('description')?.hasError('required')">
      Description is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Exception Message</mat-label>
    <textarea matInput rows="2" formControlName="exceptionMessage"></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="saveEventLog()"
    [disabled]="eventLogForm.invalid || isLoadingSave"
  >
    SAVE
    <mat-progress-spinner
      *ngIf="isLoadingSave"
      mode="indeterminate"
      diameter="20"
    ></mat-progress-spinner>
  </button>
</mat-dialog-actions>
